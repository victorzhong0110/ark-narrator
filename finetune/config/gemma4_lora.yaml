# QLoRA fine-tuning config for Gemma 4 27B-A4B (MoE)
# Architecture: 27B total params, ~4B active per forward pass
# VRAM: ~16-18 GB with 4-bit quantization (A100 40G recommended)
# Inference cost: comparable to dense 4B — MoE efficiency advantage
model:
  base_model: "google/gemma-4-27b-it"
  model_family: "gemma"
  load_in_4bit: true             # QLoRA necessary at 27B total weights
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  # Apply LoRA to attention layers only (MoE expert layers are too large)
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./checkpoints/gemma4_27b_ark"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4           # slightly lower lr for larger model
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  bf16: true                      # bfloat16 more stable than fp16 for large models
  fp16: false
  gradient_checkpointing: true    # essential at 27B to save VRAM
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  evaluation_strategy: "steps"
  save_total_limit: 2
  report_to: "wandb"
  dataloader_num_workers: 2
  max_seq_length: 4096

data:
  train_file: "./data/processed/train.jsonl"
  eval_file: "./data/processed/eval.jsonl"
  system_prompt: "你是明日方舟（Arknights）世界中的内容创作助手，精通泰拉大陆的历史、干员档案与源石技艺体系。请根据设定生成符合世界观的内容。"

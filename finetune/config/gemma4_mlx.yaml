# MLX LoRA fine-tuning — Gemma 4 E4B (公平对比第二轮)
#
# 第一轮问题：max_seq_length=2048 截断 roleplay 样本（最长 ~3800 tokens），
# 导致训练信号严重损失，输出语义破碎（val loss 3.987）。
#
# 第二轮修正：max_seq_length 升至 4096，与 Qwen3.5-9B 完全对等。
# E4B 架构优势：42 层中 35 层为滑动窗口注意力（O(n)），
# 仅 7 层全局注意力（O(n²)），seq_len 翻倍内存增长温和。
# 峰值估计 ≈ 14-16GB，24GB 应可容纳（grad_checkpoint=true）。
#
# 对比实验配置（与 qwen3_5_mlx.yaml 保持一致）：
#   max_seq_length=4096 / lr=2e-5 / rank=8 / num_layers=8 / iters=1500
#
# Usage:
#   python finetune/train_mlx.py \
#       --config finetune/config/gemma4_mlx.yaml \
#       --format roleplay

model:
  base_model: "mlx-community/gemma-4-E4B-it-4bit"   # HF base: google/gemma-4-E4B-it (gated — needs HF_TOKEN)
  model_family: "gemma"

lora:
  rank: 8               # same as Qwen — 4B model has plenty of headroom
  scale: 16.0
  dropout: 0.05
  num_layers: 8         # 42 层中 8 层 LoRA ≈ 19% 覆盖率（与 Qwen3.5-9B 一致）

training:
  output_dir: "./checkpoints/gemma4_mlx_r2_roleplay"
  batch_size: 1
  learning_rate: 2.0e-5          # 与 Qwen3.5-9B 对比实验保持一致
  lr_schedule:
    name: cosine_decay
    warmup: 100
    arguments: [2.0e-5, 1500, 0]
  warmup: 100
  val_batches: 5
  save_every: 200
  adapter_file: "adapters.safetensors"
  max_seq_length: 4096           # R2 修正：35层滑动窗口使内存增长温和，估计峰值14-16GB可容纳
  grad_checkpoint: true
  grad_clip: 0.5
  iters_per_format:
    narrative:       1000
    dialogue_window: 3000
    roleplay:        1500
    combined:        3000

data:
  train_file: "./data/processed/train.jsonl"
  eval_file:  "./data/processed/eval.jsonl"
  system_prompt: "你是明日方舟（Arknights）世界中的内容创作助手，精通泰拉大陆的历史、干员档案与源石技艺体系。请根据设定生成符合世界观的内容。"
